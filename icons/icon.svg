<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bgGradient)"/>

  <!-- Clock symbol (simplified) -->
  <circle cx="64" cy="52" r="28" fill="none" stroke="white" stroke-width="4"/>
  <line x1="64" y1="52" x2="64" y2="34" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="52" x2="76" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Simplified tabs (3 overlapping rectangles) -->
  <rect x="28" y="84" width="32" height="24" rx="4" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
  <rect x="48" y="82" width="32" height="24" rx="4" fill="rgba(255,255,255,0.9)" stroke="white" stroke-width="2"/>
  <rect x="68" y="84" width="32" height="24" rx="4" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
</svg>